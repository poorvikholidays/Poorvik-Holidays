<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poorvik Holidays | Bengaluru Vehicle Rentals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(#87CEEB,#f4f6fb);
color:#222;
overflow-x:hidden;
}

/* CLOUDS */

.cloud{
position:fixed;
font-size:40px;
opacity:0.9;
animation:cloudMove linear infinite;
}

.cloud1{top:80px;left:-100px;animation-duration:60s;}
.cloud2{top:200px;left:-200px;animation-duration:80s;}
.cloud3{top:320px;left:-150px;animation-duration:70s;}

@keyframes cloudMove{
0%{transform:translateX(0)}
100%{transform:translateX(120vw)}
}

/* BIRDS */

.birds{
position:absolute;
top:120px;
font-size:28px;
animation:fly 18s linear infinite;
}

@keyframes fly{
0%{transform:translateX(-200px)}
100%{transform:translateX(120vw)}
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
z-index:1000;
}

header h1{
color:#003366;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1504608524841-42fe6f032b4b");
background-size:cover;
background-position:center;
}

.hero h2{
font-size:48px;
margin-bottom:10px;
}

/* CARTOON VEHICLES */

.vehicles{
font-size:40px;
margin-top:10px;
animation:drive 6s linear infinite;
}

@keyframes drive{
0%{transform:translateX(-30px)}
50%{transform:translateX(30px)}
100%{transform:translateX(-30px)}
}

/* BUTTONS */

.btn{
padding:12px 24px;
border:none;
border-radius:30px;
cursor:pointer;
margin:8px;
transition:0.3s;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
}

.btn-primary{
background:#ff6600;
color:white;
}

.btn-secondary{
background:#25D366;
color:white;
}

/* SECTION */

section{
padding:90px 10%;
text-align:center;
}

.contact{
background:#003366;
color:white;
}

form{
max-width:520px;
margin:auto;
margin-top:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

#locateBtn{
width:100%;
padding:14px;
background:#ff6600;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-bottom:10px;
}

#map{
height:100px;
border-radius:12px;
}

.success{
display:none;
color:#00ff9c;
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<!-- MOVING CLOUDS -->

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>
<div class="cloud cloud3">☁️</div>

<header>
<h1>Poorvik Holidays</h1>
</header>

<div class="hero">

<h2>Comfortable Vehicle Rentals</h2>

<div class="vehicles">
🚗 🚐 🚌 🚍
</div>

<div class="birds">🐦 🐦 🐦</div>

<a href="tel:7760767875">
<button class="btn btn-primary">Call Now</button>
</a>

<a href="https://wa.me/917760767875">
<button class="btn btn-secondary">WhatsApp Booking</button>
</a>

</div>

<section class="contact">

<h2>Book Your Ride</h2>

<form id="form">

<input type="text" name="name" placeholder="Your Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="date" name="travel_date" required>

<input type="text" id="pickup" name="pickup_location"
placeholder="Pickup location will appear here"
readonly required>

<button type="button" id="locateBtn" onclick="getLocation()">
📍 Use Current Location
</button>

<div id="map"></div>

<input type="hidden" id="coordinates" name="coordinates">

<select name="vehicle_type">
<option value="">Vehicle Type</option>
<option>Car</option>
<option>Bus</option>
<option>Tempo Traveller</option>
<option>Mini Bus</option>
</select>

<textarea name="message" placeholder="Travel Details"></textarea>

<button class="btn btn-primary" type="submit">Send Enquiry</button>

<p class="success" id="success">✅ Enquiry sent successfully</p>

</form>

</section>

<footer>
© 2026 Poorvik Holidays | Bengaluru
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([12.9716,77.5946],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marker;

function getAddress(lat,lng){

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("pickup").value = data.display_name;

document.getElementById("coordinates").value = lat+","+lng;

});

}

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

map.setView([lat,lng],16);

if(marker){map.removeLayer(marker)}

marker = L.marker([lat,lng]).addTo(map);

getAddress(lat,lng);

});

}

}

map.on("click",function(e){

const lat = e.latlng.lat;
const lng = e.latlng.lng;

if(marker){map.removeLayer(marker)}

marker = L.marker([lat,lng]).addTo(map);

getAddress(lat,lng);

});

window.onload = function(){
getLocation();
}

const form=document.getElementById("form");

form.addEventListener("submit",async function(e){

e.preventDefault();

const data=new FormData(form);

await fetch("https://formspree.io/f/xojkaegp",{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

document.getElementById("success").style.display="block";

form.reset();

});

</script>

</body>
</html>
